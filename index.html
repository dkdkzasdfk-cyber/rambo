<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KLOZR Keyboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(135deg, #0a0f1a 0%, #0f1520 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app-container {
            max-width: 500px;
            width: 100%;
            background: rgba(20, 25, 35, 0.95);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(68, 136, 255, 0.3);
            backdrop-filter: blur(10px);
        }
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo h1 {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(45deg, #ffffff, #4488ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(68,136,255,0.3);
            letter-spacing: 4px;
        }
        .display-area {
            background: #0a0e14;
            border-radius: 20px;
            padding: 16px;
            min-height: 120px;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
            border: 1px solid #2a3040;
            color: #ffffff;
            font-size: 16px;
            line-height: 1.5;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 28px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-start {
            background: linear-gradient(45deg, #2277ff, #4488ff);
            color: white;
            box-shadow: 0 4px 12px rgba(34,119,255,0.3);
        }
        .btn-start:active { transform: scale(0.97); }
        .btn-stop {
            background: linear-gradient(45deg, #ff3355, #ff5577);
            color: white;
            box-shadow: 0 4px 12px rgba(255,51,85,0.3);
        }
        .btn-stop:active { transform: scale(0.97); }
        .section-title {
            color: #88aaff;
            font-size: 14px;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .add-sentence {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .add-sentence input {
            flex: 1;
            padding: 10px 16px;
            background: #0a0e14;
            border: 1px solid #2a3040;
            border-radius: 28px;
            color: white;
            font-size: 14px;
        }
        .add-sentence button {
            background: #2a6f2a;
            border: none;
            border-radius: 28px;
            padding: 0 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .sentence-list {
            max-height: 250px;
            overflow-y: auto;
            background: #0a0e14;
            border-radius: 16px;
            padding: 8px;
        }
        .sentence-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #11161f;
            margin: 6px 0;
            padding: 10px 12px;
            border-radius: 12px;
            border-left: 3px solid #4488ff;
        }
        .sentence-item span {
            flex: 1;
            color: #ddd;
            font-size: 13px;
            word-break: break-word;
        }
        .sentence-item button {
            background: #5a2a2a;
            border: none;
            border-radius: 20px;
            padding: 4px 12px;
            color: white;
            cursor: pointer;
            margin-left: 8px;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 10px;
            color: #446688;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1f2a;
        }
        ::-webkit-scrollbar-thumb {
            background: #4488ff;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="logo">
        <h1>KLOZR</h1>
    </div>

    <div class="display-area" id="displayArea">
        <!-- النص المكتوب يظهر هنا -->
    </div>

    <div class="buttons">
        <button class="btn btn-start" id="startBtn">▶ START</button>
        <button class="btn btn-stop" id="stopBtn">⏹ STOP</button>
    </div>

    <div class="section-title">📝 إضافة جملة جديدة</div>
    <div class="add-sentence">
        <input type="text" id="newSentence" placeholder="اكتب جملة ثم اضف...">
        <button id="addBtn">➕</button>
    </div>

    <div class="section-title">📋 قائمة الجمل (سيتم كتابتها تلقائياً)</div>
    <div class="sentence-list" id="sentenceList"></div>

    <div class="footer">
        © 2024 KLOZR | by .7ki. | @Fenix
    </div>
</div>

<script>
    // تحميل الجمل من التخزين المحلي
    let sentences = [];

    function loadSentences() {
        const saved = localStorage.getItem('klozr_sentences');
        if (saved) {
            sentences = JSON.parse(saved);
        }
        if (sentences.length === 0) {
            sentences = [
                "مرحباً بك في تطبيق KLOZR",
                "هذا كيبورد يكتب تلقائياً",
                "يمكنك إضافة جمل جديدة",
                "استمتع بالتجربة"
            ];
        }
        renderSentenceList();
    }

    function saveSentences() {
        localStorage.setItem('klozr_sentences', JSON.stringify(sentences));
        renderSentenceList();
    }

    function renderSentenceList() {
        const container = document.getElementById('sentenceList');
        container.innerHTML = '';
        sentences.forEach((sentence, index) => {
            const div = document.createElement('div');
            div.className = 'sentence-item';
            const span = document.createElement('span');
            span.innerText = sentence.length > 50 ? sentence.slice(0, 50) + '...' : sentence;
            const delBtn = document.createElement('button');
            delBtn.innerText = 'X';
            delBtn.onclick = () => {
                sentences.splice(index, 1);
                saveSentences();
                if (typingInterval) stopTyping();
            };
            div.appendChild(span);
            div.appendChild(delBtn);
            container.appendChild(div);
        });
    }

    // إضافة جملة جديدة
    document.getElementById('addBtn').onclick = () => {
        const input = document.getElementById('newSentence');
        const text = input.value.trim();
        if (text) {
            sentences.push(text);
            saveSentences();
            input.value = '';
        }
    };

    // منطقة العرض
    const displayArea = document.getElementById('displayArea');
    let typingInterval = null;
    let currentSentenceIndex = 0;
    let currentCharIndex = 0;
    let currentText = '';
    let isTyping = false;

    function updateDisplay() {
        displayArea.innerText = currentText;
        displayArea.scrollTop = displayArea.scrollHeight;
    }

    function typeNextChar() {
        if (!isTyping) return;
        if (sentences.length === 0) {
            stopTyping();
            return;
        }
        if (currentSentenceIndex >= sentences.length) {
            // نعيد من البداية
            currentSentenceIndex = 0;
            currentCharIndex = 0;
            currentText = '';
        }

        const sentence = sentences[currentSentenceIndex];
        if (currentCharIndex < sentence.length) {
            currentText += sentence[currentCharIndex];
            updateDisplay();
            currentCharIndex++;
        } else {
            // ننتقل إلى الجملة التالية
            currentText += '\n';
            updateDisplay();
            currentSentenceIndex++;
            currentCharIndex = 0;
        }
    }

    function startTyping() {
        if (sentences.length === 0) {
            displayArea.innerText = '⚠️ أضف جمل أولاً';
            return;
        }
        if (typingInterval) clearInterval(typingInterval);
        isTyping = true;
        currentSentenceIndex = 0;
        currentCharIndex = 0;
        currentText = '';
        updateDisplay();
        typingInterval = setInterval(typeNextChar, 0.1); // 0.1ms بين كل حرف (بسرعة عالية)
    }

    function stopTyping() {
        isTyping = false;
        if (typingInterval) {
            clearInterval(typingInterval);
            typingInterval = null;
        }
    }

    document.getElementById('startBtn').onclick = startTyping;
    document.getElementById('stopBtn').onclick = stopTyping;

    loadSentences();
</script>
</body>
</html>
